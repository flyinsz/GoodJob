name: Build GoodJob Image Artifacts

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Gitee branch/tag/ref to build
        required: false
        default: master

permissions:
  contents: read

env:
  SOURCE_REPO: https://gitee.com/sendoh-huang/GoodJob.git
  SOURCE_REF: ${{ inputs.source_ref || 'master' }}

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: Dockerfile.backend
            image: goodjob-backend
          - name: frontend
            dockerfile: Dockerfile.frontend
            image: goodjob-frontend
    steps:
      - name: Checkout Docker wrapper repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image tar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ghcr.io/flyinsz/${{ matrix.image }}:latest
          build-args: |
            SOURCE_REPO=${{ env.SOURCE_REPO }}
            SOURCE_REF=${{ env.SOURCE_REF }}
          outputs: type=docker,dest=/tmp/${{ matrix.image }}.tar
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Compress image tar
        run: zstd -T0 -19 /tmp/${{ matrix.image }}.tar -o /tmp/${{ matrix.image }}.tar.zst

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image }}-tar-zst
          path: /tmp/${{ matrix.image }}.tar.zst
          retention-days: 3
