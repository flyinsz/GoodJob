services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-goodjob_crm}
      MYSQL_USER: ${MYSQL_USER:-goodjob}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
    volumes:
      - goodjob_mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/flyinsz/goodjob-backend:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      CRM_STORE: mysql
      DATABASE_URL: mysql://${MYSQL_USER:-goodjob}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-goodjob_crm}
      PORT: 4188
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?set INITIAL_ADMIN_PASSWORD}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Super Admin}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:8080}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-true}
    ports:
      - "4188:4188"

  frontend:
    image: ghcr.io/flyinsz/goodjob-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  goodjob_mysql:
