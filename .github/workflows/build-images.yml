name: Build GoodJob Docker Images

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Gitee branch/tag/ref to build
        required: false
        default: master
  push:
    branches: [main]
    paths:
      - Dockerfile.backend
      - Dockerfile.frontend
      - docker/**
      - .github/workflows/build-images.yml

permissions:
  contents: read
  packages: write

concurrency:
  group: goodjob-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  SOURCE_REPO: https://gitee.com/sendoh-huang/GoodJob.git
  SOURCE_REF: ${{ inputs.source_ref || 'master' }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: Dockerfile.backend
            image: goodjob-backend
          - name: frontend
            dockerfile: Dockerfile.frontend
            image: goodjob-frontend
    steps:
      - name: Checkout Docker wrapper repo
        uses: actions/checkout@v4

      - name: Resolve upstream revision
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          git clone --depth=1 --branch "$SOURCE_REF" "$SOURCE_REPO" "$tmpdir"
          rev=$(git -C "$tmpdir" rev-parse HEAD)
          echo "revision=$rev" >> "$GITHUB_OUTPUT"
          echo "Upstream $SOURCE_REPO $SOURCE_REF -> $rev"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.SOURCE_REF }}
            type=sha,prefix=git-

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            SOURCE_REPO=${{ env.SOURCE_REPO }}
            SOURCE_REF=${{ env.SOURCE_REF }}
            SOURCE_REV=${{ steps.upstream.outputs.revision }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=${{ env.SOURCE_REPO }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.revision }}
            org.opencontainers.image.ref.name=${{ env.SOURCE_REF }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
